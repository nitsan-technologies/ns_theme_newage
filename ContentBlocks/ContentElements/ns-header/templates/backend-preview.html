<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Preview"/>
<f:section name="Content">
	<div class="ns-backend-preview">
		<h2><b><f:translate key="LLL:EXT:ns_theme_newage/Resources/Private/Language/locallang_db.xlf:wizard.ns_header" /></b></h2>

		<f:variable name="bg-image" value="" />
		<f:if condition="{data.file2.0}">
			<f:variable name="bg-image" value="{f:uri.image(image: data.file2.0, absolute: 1)}" />
		</f:if>

		<div class="container h-100" style="{f:if(condition: data.file2.0, then:'background-image:url({bg-image})')}">
			<div class="header-teaser">
				<div class="row">
					<div class="col-lg-6 col-md-12">
						<div class="header-content">
							<f:if condition="{data.text}">
								<h1 class="mb-5">{data.text}</h1>
							</f:if>
							<f:if condition="{data.btn_text} && {data.link.url} != ''">
								<span class="btn">{data.btn_text}</span>
							</f:if>
						</div>
					</div>
					<div class="col-lg-6 col-md-12">
						<div class="header-image">
							<f:for each="{data.image}" as="img">
								<f:image height="350px" width="200px" src="fileadmin{img.originalFile.identifier}" />
							</f:for>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</f:section>
</html>
