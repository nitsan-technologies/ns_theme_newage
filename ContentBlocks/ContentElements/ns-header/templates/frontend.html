<html data-namespace-typo3-fluid="true" xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers">

  <f:if condition="{data.file2.0}">

    <f:then>
      <header id="home" class="masthead with-bg{f:editMode(then: ' masthead-edit-mode')}"
        style="background-image: url('{f:uri.image(image: '{data.file2.0}', treatIdAsReference: 1, crop: false)}');">
    </f:then>
    <f:else>
      <header class="masthead{f:editMode(then: ' masthead-edit-mode')}">
    </f:else>
  </f:if>
        <div class="container h-100 {f:if(condition: data.space_before_class, then: ' frame-space-before-{data.space_before_class}')}{f:if(condition: data.space_after_class, then: ' frame-space-after-{data.space_after_class}')}">
          <div class="row h-100">
            <div class="col-lg-7">
              <div class="header-content mx-auto">
                <f:variable name="heroText" value="{data -> f:render.text(field: 'text')}" />
                <f:if condition="{heroText}">
                  <h1 class="mb-5" style="color: #fff !important;">{heroText}</h1>
                </f:if>
                <f:variable name="btnText" value="{data -> f:render.text(field: 'btn_text')}" />
                <f:if condition="{btnText}">
                  <f:if condition="{data.link.url}">
                    <f:link.typolink parameter="{data.link.url}" class="btn btn-outline btn-xl js-scroll-trigger">{btnText}</f:link.typolink>
                  </f:if>
                  <f:if condition="{data.link} && !{data.link.url}">
                    <f:link.typolink parameter="{data.link}" class="btn btn-outline btn-xl js-scroll-trigger">{btnText}</f:link.typolink>
                  </f:if>
                </f:if>
              </div>
            </div>
            <f:if condition="{data.image.0}">
              <div class="col-lg-5">
                <div class="device-container">
                  <div class="device-mockup">
                    <f:image image="{data.image.0}" height="650c" width="323c" crop="false" />
                  </div>
                </div>
              </div>
            </f:if>
          </div>
        </div>
  </header>

</html>
