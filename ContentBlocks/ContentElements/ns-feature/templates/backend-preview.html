<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
  <link rel="stylesheet" type="text/css" href="/typo3conf/ext/ns_theme_newage/Resources/Public/vendor/simple-line-icons/css/simple-line-icons.css?1637210195" media="all">
  
  <div class="ns-backend-preview">
    <h2><b><f:translate key="LLL:EXT:ns_theme_newage/Resources/Private/Language/locallang_db.xlf:wizard.ns_feature" /></b></h2>
    <f:if condition="{data.header}">
      <h2 class="text-center">{data.header}</h2>
    </f:if>
    <f:if condition="{data.subheader}">
      <p class="text-center">{data.subheader}</p>
    </f:if>
    <div class="row">
      <div class="col-lg-4 col-sm-12">
        <f:if condition="{data.image}">
          <f:for each="{data.image}" as="item" iteration="i">
            <f:if condition="{i.cycle} < 3">
              <div class="feature-image">
                <img src="{item.publicUrl}" alt="{item.alternative}" title="{item.title}" style="max-height: 200px; max-width: 200px; object-fit: cover;"/>
              </div>
            </f:if>
          </f:for>
        </f:if>
      </div>
      <div class="col-lg-8 col-sm-12">
        <div class="feature-div">
          <div class="row">
            <f:for each="{data.contact_feature}" as="item" iteration="i">
              <f:if condition="{i.cycle} < 3">
                <div class="feture-items text-center">
                  <div class="col-lg-6 col-sm-12">
                    <f:if condition="{item.container.socialIcon}">
                      <div class="feture-icon">
                        <i class="{item.container.socialIcon}"></i>
                      </div>
                    </f:if>
                    <f:if condition="{item.title}">
                      <h3 class="text-center">{item.title}</h3>
                    </f:if>
                    <f:if condition="{item.text}">
                      <f:format.crop maxCharacters="100" append="...">
                        <p class="text-center">{item.text}</p>
                      </f:format.crop>
                    </f:if>
                  </div>
                </div>
              </f:if>
            </f:for>
          </div>
        </div>
      </div>
    </div>
  </div>

</html>
